opencollection: 1.0.0

info:
  name: Lynqa API
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  headers:
    - name: ""
      value: ""
  auth:
    type: apikey
    key: x-api-key
    value: "{{apiKey}}"
    placement: header
  variables:
    - name: baseUrl
      value: https://api.lynqa.smartesting.com
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
    presets:
      request:
        type: http
        url: "{{baseUrl}}"
