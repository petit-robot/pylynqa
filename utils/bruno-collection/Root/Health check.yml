info:
  name: Health check
  type: http
  seq: 1
  tags:
    - Root

http:
  method: GET
  url: "{{baseUrl}}/"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: API is up and running
    request:
      url: "{{baseUrl}}/"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "name": "lynqa-api",
            "status": "ok",
            "version": "1.0.0",
            "docs": "/api-docs",
            "time": "2026-04-21T10:00:00.000Z"
          }

docs: Returns the current status of the API along with its version and timestamp.
