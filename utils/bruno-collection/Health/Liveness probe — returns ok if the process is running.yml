info:
  name: Liveness probe — returns ok if the process is running
  type: http
  seq: 1
  tags:
    - Health

http:
  method: GET
  url: "{{baseUrl}}/health/live"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/health/live"
      method: GET
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: ""
