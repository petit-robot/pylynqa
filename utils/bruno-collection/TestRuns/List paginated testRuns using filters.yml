info:
  name: List paginated testRuns using filters
  type: http
  seq: 8
  tags:
    - TestRuns

http:
  method: POST
  url: "{{baseUrl}}/testRuns/query"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
  params:
    - name: cursor
      value: ""
      type: query
      description: Only return test runs from the cursor ID
      disabled: true
    - name: limit
      value: ""
      type: query
      description: Maximum number of results to return
      disabled: true
  body:
    type: json
    data: |-
      {
        "statuses": [
          "waiting"
        ],
        "relativePeriod": "",
        "startDate": "",
        "endDate": "",
        "apiKeyIds": [
          []
        ],
        "testRunIds": [
          []
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

