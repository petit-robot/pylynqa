info:
  name: Get the full status of the test with the specified ID
  type: http
  seq: 6
  tags:
    - TestRuns

http:
  method: GET
  url: "{{baseUrl}}/testRuns/:testRunId/fullStatus"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
  params:
    - name: testRunId
      value: "{{testRunId}}"
      type: path
      description: ID of the test
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Full status of the test
    request:
      url: "{{baseUrl}}/testRuns/:testRunId/fullStatus"
      method: GET
      headers:
        - name: x-api-key
          value: "{{apiKey}}"
      params:
        - name: testRunId
          value: ""
          type: path
          description: ID of the test
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: ""
  - name: 401 Response
    description: Authentication failed
    request:
      url: "{{baseUrl}}/testRuns/:testRunId/fullStatus"
      method: GET
      headers:
        - name: x-api-key
          value: "{{apiKey}}"
      params:
        - name: testRunId
          value: ""
          type: path
          description: ID of the test
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
  - name: 404 Response
    description: Test run not found
    request:
      url: "{{baseUrl}}/testRuns/:testRunId/fullStatus"
      method: GET
      headers:
        - name: x-api-key
          value: "{{apiKey}}"
      params:
        - name: testRunId
          value: ""
          type: path
          description: ID of the test
    response:
      status: 404
      statusText: Not Found
      body:
        type: text
        data: ""
  - name: 410 Response
    description: Test run expired
    request:
      url: "{{baseUrl}}/testRuns/:testRunId/fullStatus"
      method: GET
      headers:
        - name: x-api-key
          value: "{{apiKey}}"
      params:
        - name: testRunId
          value: ""
          type: path
          description: ID of the test
    response:
      status: 410
      statusText: Gone
      body:
        type: text
        data: ""
  - name: 429 Response
    description: Too many requests
    request:
      url: "{{baseUrl}}/testRuns/:testRunId/fullStatus"
      method: GET
      headers:
        - name: x-api-key
          value: "{{apiKey}}"
      params:
        - name: testRunId
          value: ""
          type: path
          description: ID of the test
    response:
      status: 429
      statusText: Too Many Requests
      body:
        type: text
        data: ""
