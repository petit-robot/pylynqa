info:
  name: Execute a manual test
  type: http
  seq: 1
  tags:
    - TestRuns

http:
  method: POST
  url: "{{baseUrl}}/testRuns"
  headers:
    - name: x-api-consumer
      value: petit-robot:bruno
    - name: x-api-key
      value: "{{apiKey}}"
  body:
    type: json
    data: |-
      {
        "url": "https://google.com/",
        "name": "Test success Google Maps",
        "context": {
          "clientLanguage": "fr-FR, français, fr",
          "clientDatetime": "Thu Feb 26 2026 09:26:12 GMT+0100 (Central Europe time)"
        },
        "guidance": [
          {
            "text": "The user is between 18 and 49" 
          }
        ],
        "steps": [
          {
            "action": "Accède à Google Maps via https://www.google.com/maps",
            "expectedResult": "On est sur Google Maps",
            "guidance": [
              {
                "text": "The user is between 18 and 49"
              }
            ]
          },
          {
            "action": "Cherche le Centre Alma de Rennes en cliquant sur l'icône de recherche \"Centre Alma de Rennes\" dessus",
            "expectedResult": "Il trouve le Centre Alma de Rennes",
            "guidance": [
              {
                "text": "The user is between 18 and 49"
              }
            ]
          }
        ]
      }
      // the guidance had no influence on the test
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const testRunId = res.getBody();
        if (testRunId) {
          bru.setVar("testRunId", testRunId);
          console.log("testRunId captured:", testRunId);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

