info:
  name: Execute a Gherkin test
  type: http
  seq: 2
  tags:
    - TestRuns

http:
  method: POST
  url: "{{baseUrl}}/testRuns/gherkin"
  headers:
    - name: x-api-consumer
      value: petit-robot:bruno
  body:
    type: json
    data: |-
      {
        "url": "https://example.com/",
        "name": "My test name",
        "context": "",
        "guidance": [
          {
            "text": "The user is between 18 and 49"
          }
        ],
        "attachments": [
          {
            "name": "invoice_260313.pdf",
            "data": "data:text/plain;base64,SGVsbG8gd29ybGQh"
          }
        ],
        "scenario": "Given the user is connected\nWhen the user search for a book\nThen a list of books is displayed"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const testRunId = res.getBody();
        if (testRunId) {
          bru.setVar("testRunId", testRunId);
          console.log("testRunId captured:", testRunId);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

