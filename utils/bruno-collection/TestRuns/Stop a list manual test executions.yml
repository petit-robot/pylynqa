info:
  name: Stop a list manual test executions
  type: http
  seq: 7
  tags:
    - TestRuns

http:
  method: POST
  url: "{{baseUrl}}/testRuns/stop"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
  body:
    type: json
    data: |-
      {
        "testRunIds": [
          "m626fwxopxr489raizu6hjgy",
          "zcuk4l13zax1piz2h73imct6"
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 202 Response
    description: Tests will be stopped
    request:
      url: "{{baseUrl}}/testRuns/stop"
      method: POST
      headers:
        - name: x-api-key
          value: "{{apiKey}}"
      body:
        type: json
        data: |-
          {
            "testRunIds": [
              "m626fwxopxr489raizu6hjgy",
              "zcuk4l13zax1piz2h73imct6"
            ]
          }
    response:
      status: 202
      statusText: Accepted
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "stoppedTestRunIds": [
              "m626fwxopxr489raizu6hjgy",
              "zcuk4l13zax1piz2h73imct6"
            ]
          }
  - name: 400 Response
    description: Body is malformed
    request:
      url: "{{baseUrl}}/testRuns/stop"
